<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Device Usage Impact Visualizer</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  <script src="{{ url_for('static', filename='script.js') }}"></script>  
</head>
<body>
  <div class="container">
    <h1>Device Usage Impact Visualizer</h1>
    <div class="form">
      <label>Select Device:</label>
      <select id="device">
        <option value="Laptop">Laptop</option>
        <option value="Mobile">Mobile</option>
        <option value="TV">TV</option>
      </select>
      <br/>
      <label>Usage Hours per Day:</label>
      <input type="number" id="hours" min="0" step="0.1">
      <button onclick="analyze()">Visualize</button>
    </div>
    <div id="results">
      <p><strong>Energy Used:</strong> <span id="energy"></span> kWh</p>
      <p><strong>Carbon Emission:</strong> <span id="co2"></span> grams</p>
    </div>
    <canvas id="impactChart" width="400" height="300"></canvas>
  </div>

  <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
